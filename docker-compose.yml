# ============================================
# Knowledge Base - Docker Compose
# 一键部署完整应用
# ============================================

services:
  # ============================================
  # PostgreSQL 数据库 (带 pgvector 扩展)
  # ============================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: kb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kb_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kb_password}
      POSTGRES_DB: ${POSTGRES_DB:-knowledge_base}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-kb_user} -d ${POSTGRES_DB:-knowledge_base}']
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Redis 缓存
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: kb-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Meilisearch 搜索引擎
  # ============================================
  meilisearch:
    image: getmeili/meilisearch:v1.8
    container_name: kb-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-kb_meili_master_key_change_in_production}
      MEILI_ENV: production
      MEILI_NO_ANALYTICS: 'true'
    ports:
      - "${MEILI_PORT:-7700}:7700"
    volumes:
      - meilisearch_data:/meili_data
    deploy:
      resources:
        limits:
          memory: 384M
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--spider', 'http://127.0.0.1:7700/health']
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # API 服务 (NestJS) - 使用 host 网络模式
  # ============================================
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: kb-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-kb_user}:${POSTGRES_PASSWORD:-kb_password}@localhost:5432/${POSTGRES_DB:-knowledge_base}?schema=public
      REDIS_URL: redis://localhost:6379
      MEILI_HOST: http://localhost:7700
      MEILI_API_KEY: ${MEILI_MASTER_KEY:-kb_meili_master_key_change_in_production}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.openai.com/v1}
      AI_CHAT_MODEL: ${AI_CHAT_MODEL:-gpt-3.5-turbo}
      AI_EMBEDDING_MODEL: ${AI_EMBEDDING_MODEL:-text-embedding-3-small}
    network_mode: host
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://127.0.0.1:4000/api/v1/health']
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 5

  # ============================================
  # Web 前端 (Next.js) - 使用 host 网络模式
  # ============================================
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
    container_name: kb-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: development
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
    network_mode: host
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://127.0.0.1:3000']
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

# ============================================
# 数据卷
# ============================================
volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
